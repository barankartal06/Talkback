<h1>Talkback</h1>
<script src="/socket.io/socket.io.js"></script>
<script>
    const audioContext = new AudioContext()
    const socket = io()
    const name= prompt('what is your name?')
    socket.emit('join', name)
    navigator.mediaDevices.getUserMedia({audio: true})
        .then((stream)=> {
            const recorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' })
            recorder.start(250)
            let initChunk = null
            recorder.ondataavailable = (event) => {
                if (!initChunk){
                    initChunk=event.data
                    socket.emit('audio', event.data)
                }else{
                    const blob = new Blob([initChunk, event.data])
                    socket.emit('audio', blob )
                }
                }
                
        })
    let nextStartTime = 0
    socket.on('audio', (arrayBuffer) => {
        console.log(typeof arrayBuffer, arrayBuffer)
        audioContext.decodeAudioData(arrayBuffer, (buffer)=>{
        const source = audioContext.createBufferSource()
        source.buffer = buffer
        source.connect(audioContext.destination)
        if (nextStartTime<audioContext.currentTime){
            nextStartTime=audioContext.currentTime+0.05}
        source.start(nextStartTime)
        nextStartTime+=buffer.duration
        })        
    })
</script>
