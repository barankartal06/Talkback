<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talkback</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="talkback-page">

    <header class="talkback-header">
        <span class="talkback-logo">Talkback</span>
        <span class="talkback-name" id="display-name"></span>
    </header>

    <div class="talkback-center">
        <p class="mute-status" id="mute-status">Live</p>
        <button class="mute-btn" id="mute-btn" onclick="toggleMute()">Mute</button>
        <p style="font-family: 'Inter', sans-serif; font-size: 0.9rem; color: #555; line-height: 1.6; background: #fff; border: 1px solid #E8E8E8; border-radius: 8px; padding: 1rem 1.25rem; max-height: 160px; overflow-y: auto; white-space: pre-wrap;">1-Madem, 2-Son Arzum, 3-Tek Başına, 4-Ask Nerede, 5-Daha Mutlu Olamam, 6-Cevapsız Sorular, 7-Careless Whisper</p>
    </div>

    <footer class="talkback-footer">tap to mute</footer>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    let stream

    (async () => {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true })
        const socket = io()
        const name = prompt('What is your name?')
        document.getElementById('display-name').textContent = name
        socket.emit('join', name)
        const connections = {}

        socket.on('existing-peers', async (peers) => {
            for (const id in peers) {
                const pc = new RTCPeerConnection({
                    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                })
                connections[id] = pc
                pc.ontrack = (e) => {
                    const audio = new Audio()
                    audio.srcObject = e.streams[0]
                    audio.play()
                }
                stream.getTracks().forEach(track => pc.addTrack(track, stream))
                const offer = await pc.createOffer()
                await pc.setLocalDescription(offer)
                socket.emit('offer', offer, id)
                pc.onicecandidate = (ev) => {
                    if (ev.candidate != null) socket.emit('ice-candidate', ev.candidate, id)
                }
            }
        })

        socket.on('offer', async (offer, senderId) => {
            const pc = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            })
            connections[senderId] = pc
            pc.ontrack = (e) => {
                const audio = new Audio()
                audio.srcObject = e.streams[0]
                audio.play()
            }
            stream.getTracks().forEach(track => pc.addTrack(track, stream))
            pc.onicecandidate = (ev) => {
                if (ev.candidate != null) socket.emit('ice-candidate', ev.candidate, senderId)
            }
            await pc.setRemoteDescription(offer)
            const answer = await pc.createAnswer()
            await pc.setLocalDescription(answer)
            socket.emit('answer', answer, senderId)
        })

        socket.on('answer', async (answer, senderId) => {
            await connections[senderId].setRemoteDescription(answer)
        })

        socket.on('ice-candidate', async (candidate, sourceId) => {
            await connections[sourceId].addIceCandidate(candidate)
        })
    })()
</script>
<script>
    let muted = false

    function toggleMute() {
        if (muted) {
            stream.getAudioTracks()[0].enabled = true
            muted = false
        } else {
            stream.getAudioTracks()[0].enabled = false
            muted = true
        }
        const status = document.getElementById('mute-status')
        const btn = document.getElementById('mute-btn')
        const footer = document.querySelector('.talkback-footer')
        if (muted) {
            status.textContent = 'Muted'
            status.classList.add('is-muted')
            btn.textContent = 'Unmute'
            btn.classList.add('is-muted')
            footer.textContent = 'tap to unmute'
        } else {
            status.textContent = 'Live'
            status.classList.remove('is-muted')
            btn.textContent = 'Mute'
            btn.classList.remove('is-muted')
            footer.textContent = 'tap to mute'
        }
    }
</script>
</body>
</html>
