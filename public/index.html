<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talkback</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- ENTRY VIEW -->
<div id="entry-view" class="entry">

    <div class="entry-brand">Talkback</div>

    <div class="entry-card">
        <label class="field-label" for="name-input">Your name</label>
        <input
            id="name-input"
            class="name-input"
            type="text"
            placeholder="e.g. Baran"
            autocomplete="off"
            maxlength="24"
        >
        <p class="field-hint" id="name-hint">Enter a name to continue</p>

        <div class="entry-split">

            <div class="split-section split-create">
                <p class="split-title">Start a room</p>
                <p class="split-sub">Get a code others can join with</p>
                <button id="create-btn" class="action-btn action-create" disabled>
                    Create room
                </button>
            </div>

            <div class="split-divider"><span>or</span></div>

            <div class="split-section split-join" id="join-section">
                <p class="split-title">Join a room</p>
                <p class="split-sub">Enter the 6-digit code</p>
                <input
                    id="code-input"
                    class="code-input hidden"
                    type="text"
                    inputmode="numeric"
                    placeholder="000000"
                    maxlength="6"
                >
                <button id="join-btn" class="action-btn action-join" disabled>
                    Join room
                </button>
            </div>

        </div>

        <p class="entry-error hidden" id="entry-error"></p>
    </div>

</div>

<!-- ROOM VIEW -->
<div id="room-view" class="talkback-page hidden">

    <header class="talkback-header">
        <button class="talkback-code" id="code-btn"></button>
        <span class="talkback-logo">Talkback</span>
        <span class="talkback-name" id="display-name"></span>
    </header>

    <div class="talkback-center">
        <p class="mute-status" id="mute-status">Live</p>
        <button class="mute-btn" id="mute-btn" onclick="toggleMute()">Mute</button>
        <div class="setlist" id="setlist">1-Madem, 2-Son Arzum, 3-Tek Başına, 4-Ask Nerede, 5-Daha Mutlu Olamam, 6-Cevapsız Sorular, 7-Careless Whisper</div>
    </div>

    <footer class="talkback-footer">tap to mute</footer>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/client.js" defer></script>
</body>
</html>
